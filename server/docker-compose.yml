services:
  mysql:
    image: mysql:8.0
    container_name: seafishing-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: seafishing
      MYSQL_USER: seafishing
      MYSQL_PASSWORD: seafishing
    ports:
      - "3306:3306"
    volumes:
      - seafishing_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  seafishing_mysql_data:
